services:
  postgres:
    image: postgres:16-alpine
    container_name: tfn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tfn
    ports:
      - "5432:5432"
    volumes:
      - tfn-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tfn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tfn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tfn-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: tfn-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - tfn-chroma-data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tfn-postgres-data:
  tfn-redis-data:
  tfn-chroma-data:
